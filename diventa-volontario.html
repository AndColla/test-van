document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

in-ext */\n@font-face {\n  font-family: 'IBM Plex Sans';\n  font-style: normal;\n  font-weight: 700;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"188b9287-d91a-4d00-9793-8117f953d92c\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'IBM Plex Sans';\n  font-style: normal;\n  font-weight: 700;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"af85b761-48eb-460a-932e-bb37c48b4bf7\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* ============================== TOKENS ============================== */\n:root{\n  --blu:#0160a1;        /* primario istituzionale */\n  --blu-scuro:#034b7c;\n  --blu-tint:#e9f2f9;\n  --verde:#008a3a;      /* secondario — allineato al logo */\n  --verde-scuro:#006e2f;\n  --verde-tint:#e5f3ea;\n  --rosso:#c81e1e;      /* solo emergenza 112 */\n  --rosso-tint:#fbeaea;\n\n  --ink:#13212e;        /* testo principale, blu-antracite */\n  --slate:#46586a;      /* testo secondario */\n  --slate-2:#6e8090;\n  --line:#dde4ea;\n  --line-2:#eef2f6;\n  --bg:#f5f7f9;\n  --bg-2:#eef2f6;\n  --white:#ffffff;\n\n  --r-sm:8px; --r:14px; --r-lg:22px; --r-xl:30px;\n  --sh-1:0 1px 2px rgba(19,33,46,.05), 0 2px 8px rgba(19,33,46,.04);\n  --sh-2:0 12px 30px -12px rgba(19,33,46,.18);\n  --sh-3:0 30px 60px -24px rgba(3,75,124,.34);\n\n  --f-display:'Archivo', system-ui, sans-serif;\n  --f-body:'IBM Plex Sans', system-ui, sans-serif;\n  --f-mono:'IBM Plex Mono', ui-monospace, monospace;\n\n  --maxw:1200px;\n  --pad:clamp(20px,5vw,64px);\n}\n\n*{box-sizing:border-box;margin:0;padding:0}\nhtml{scroll-behavior:smooth;-webkit-text-size-adjust:100%}\nbody{\n  font-family:var(--f-body);\n  color:var(--ink);\n  background:var(--bg);\n  line-height:1.6;\n  font-size:17px;\n  -webkit-font-smoothing:antialiased;\n}\nimg{max-width:100%;display:block}\na{color:inherit;text-decoration:none}\nh1,h2,h3,h4{font-family:var(--f-display);line-height:1.05;letter-spacing:-.02em;font-weight:800}\n\n.wrap{max-width:var(--maxw);margin:0 auto;padding-inline:var(--pad)}\n.sect{padding-block:clamp(56px,8vw,108px)}\n\n/* eyebrow / label */\n.eyebrow{\n  font-family:var(--f-mono);font-size:12.5px;font-weight:500;\n  letter-spacing:.16em;text-transform:uppercase;color:var(--blu);\n  display:inline-flex;align-items:center;gap:9px;\n}\n.eyebrow::before{content:\"\";width:22px;height:2px;background:var(--blu);display:inline-block}\n.eyebrow.green{color:var(--verde)}\n.eyebrow.green::before{background:var(--verde)}\n.eyebrow.light{color:#9fc4e3}\n.eyebrow.light::before{background:#9fc4e3}\n\n.lead{font-size:clamp(18px,2vw,20px);color:var(--slate);max-width:60ch}\n\n/* ============================== BUTTONS ============================== */\n.btn{\n  display:inline-flex;align-items:center;gap:10px;\n  font-family:var(--f-display);font-weight:700;font-size:15.5px;letter-spacing:-.01em;white-space:nowrap;\n  padding:15px 26px;border-radius:999px;border:1.5px solid transparent;cursor:pointer;\n  transition:transform .18s ease, box-shadow .18s ease, background .18s ease, color .18s ease, border-color .18s ease;\n}\n.btn svg{width:18px;height:18px}\n.btn-primary{background:var(--blu);color:#fff;box-shadow:0 10px 22px -10px rgba(1,96,161,.7)}\n.btn-primary:hover{background:var(--blu-scuro);transform:translateY(-2px);box-shadow:0 16px 30px -12px rgba(1,96,161,.7)}\n.btn-green{background:var(--verde);color:#fff;box-shadow:0 10px 22px -10px rgba(0,118,62,.7)}\n.btn-green:hover{background:var(--verde-scuro);transform:translateY(-2px)}\n.btn-ghost{background:transparent;border-color:rgba(255,255,255,.5);color:#fff}\n.btn-ghost:hover{background:rgba(255,255,255,.12);border-color:#fff;transform:translateY(-2px)}\n.btn-outline{background:#fff;border-color:var(--line);color:var(--ink)}\n.btn-outline:hover{border-color:var(--blu);color:var(--blu);transform:translateY(-2px)}\n.btn-sm{padding:11px 18px;font-size:14px}\n\n.link-arrow{font-family:var(--f-display);font-weight:700;font-size:15px;color:var(--blu);display:inline-flex;align-items:center;gap:8px;transition:gap .18s ease}\n.link-arrow svg{width:16px;height:16px;transition:transform .18s ease}\n.link-arrow:hover{gap:12px}\n.link-arrow.green{color:var(--verde)}\n\n/* ============================== HEADER ============================== */\n.topbar{background:var(--ink);color:#cdd8e2;font-size:13px}\n.topbar .wrap{display:flex;align-items:center;justify-content:space-between;gap:16px;min-height:40px;flex-wrap:wrap}\n.topbar a{color:#cdd8e2;transition:color .15s;white-space:nowrap}\n.topbar a:hover{color:#fff}\n.topbar .emerg{display:inline-flex;align-items:center;gap:9px;font-family:var(--f-mono);font-weight:500;letter-spacing:.02em;white-space:nowrap}\n.topbar .emerg .dot{width:9px;height:9px;border-radius:50%;background:var(--rosso);box-shadow:0 0 0 0 rgba(200,30,30,.6);animation:pulse 2.4s infinite}\n.topbar .emerg b{color:#fff}\n@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(200,30,30,.55)}70%{box-shadow:0 0 0 8px rgba(200,30,30,0)}100%{box-shadow:0 0 0 0 rgba(200,30,30,0)}}\n.topbar .tb-right{display:flex;align-items:center;gap:18px}\n.topbar .tb-right .sep{width:1px;height:16px;background:rgba(255,255,255,.18)}\n\nheader.site{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.86);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);transition:box-shadow .2s, background .2s}\nheader.site.scrolled{box-shadow:0 6px 24px -16px rgba(19,33,46,.4)}\n.nav{display:flex;align-items:center;justify-content:space-between;gap:24px;min-height:74px}\n.brand{display:flex;align-items:center;gap:13px}\n.logo{width:46px;height:46px;border-radius:11px;background:var(--blu);display:grid;place-items:center;flex:none;position:relative;overflow:hidden;box-shadow:var(--sh-1)}\n.logo::after{content:\"\";position:absolute;inset:0;background:var(--verde);clip-path:polygon(0 62%,100% 38%,100% 100%,0 100%);opacity:.95}\n.logo span{position:relative;z-index:2;color:#fff;font-family:var(--f-display);font-weight:900;font-size:19px;letter-spacing:-.04em}\n.cross{position:absolute;z-index:2;width:15px;height:15px;top:7px;right:7px}\n.cross::before,.cross::after{content:\"\";position:absolute;background:#fff;border-radius:1px}\n.cross::before{left:6px;top:0;width:3px;height:15px}\n.cross::after{top:6px;left:0;height:3px;width:15px}\n.brand .bt{line-height:1.05}\n.brand .bt b{font-family:var(--f-display);font-weight:800;font-size:18px;letter-spacing:-.02em;display:block}\n.brand .bt small{font-family:var(--f-mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--slate-2)}\n.logo-img{height:48px;width:auto;display:block}\n.foot-logo{background:#fff;border-radius:14px;padding:11px 15px;display:inline-block;box-shadow:var(--sh-1)}\n.foot-logo img{height:42px;width:auto;display:block}\n\n.menu{display:flex;align-items:center;gap:4px}\n.menu a{font-family:var(--f-display);font-weight:600;font-size:15px;padding:9px 14px;border-radius:9px;color:var(--ink);transition:background .15s,color .15s;white-space:nowrap}\n.menu a:hover{background:var(--blu-tint);color:var(--blu)}\n.nav-cta{display:flex;align-items:center;gap:10px}\n.burger{display:none;width:46px;height:46px;border:1px solid var(--line);background:#fff;border-radius:11px;cursor:pointer;flex-direction:column;gap:5px;align-items:center;justify-content:center}\n.burger span{width:20px;height:2px;background:var(--ink);border-radius:2px;transition:.25s}\n.burger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}\n.burger.open span:nth-child(2){opacity:0}\n.burger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}\n\n/* mobile me 02em}\n.prose ul{list-style:none;margin:18px 0;display:flex;flex-direction:column;gap:11px}\n.prose ul li{position:relative;padding-left:30px;color:var(--slate)}\n.prose ul li::before{content:\"\";position:absolute;left:0;top:9px;width:14px;height:14px;border-radius:50%;background:var(--verde-tint);border:3px solid var(--verde)}\n\n/* ---- Split 2-col content ---- */\n.split{display:grid;grid-template-columns:1fr 1fr;gap:clamp(32px,5vw,72px);align-items:center}\n.split.media-r{grid-template-columns:1.05fr .95fr}\n.split .media .ph{aspect-ratio:4/3;border-radius:var(--r-xl)}\n.split .media.tall .ph{aspect-ratio:4/5}\n\n/* ---- Section heading (centered option) ---- */\n.shead-c{text-align:center;max-width:62ch;margin:0 auto 42px}\n.shead-c .eyebrow{justify-content:center;display:flex}\n.shead-c h2{font-size:clamp(28px,4vw,46px);margin-top:14px}\n.shead-c .lead{margin:14px auto 0}\n\n/* ---- Value cards ---- */\n.values{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}\n.value{background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);padding:28px}\n.value .ic{width:50px;height:50px;border-radius:14px;background:var(--blu-tint);color:var(--blu);display:grid;place-items:center;margin-bottom:16px}\n.value.g .ic{background:var(--verde-tint);color:var(--verde)}\n.value .ic svg{width:26px;height:26px}\n.value h3{font-size:20px;letter-spacing:-.02em;margin-bottom:8px}\n.value p{font-size:14.5px;color:var(--slate)}\n\n/* ---- Timeline (storia) ---- */\n.timeline{position:relative;margin-top:10px;padding-left:34px}\n.timeline::before{content:\"\";position:absolute;left:9px;top:6px;bottom:6px;width:2px;background:var(--line)}\n.tl-item{position:relative;padding:0 0 30px 0}\n.tl-item:last-child{padding-bottom:0}\n.tl-item::before{content:\"\";position:absolute;left:-30px;top:4px;width:20px;height:20px;border-radius:50%;background:#fff;border:4px solid var(--blu)}\n.tl-item .yr{font-family:var(--f-display);font-weight:900;font-size:20px;color:var(--blu);letter-spacing:-.02em}\n.tl-item h4{font-size:18px;letter-spacing:-.01em;margin:3px 0 6px}\n.tl-item p{font-size:14.5px;color:var(--slate);max-width:60ch}\n\n/* ---- Team ---- */\n.team{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}\n.tcard{background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden}\n.tcard .ph{aspect-ratio:1/1;border-radius:0}\n.tcard .tb{padding:16px 18px}\n.tcard .tb b{font-family:var(--f-display);font-weight:700;font-size:16px;display:block;letter-spacing:-.01em}\n.tcard .tb span{font-family:var(--f-mono);font-size:12px;color:var(--slate-2)}\n\n/* ---- Detailed service ---- */\n.svc-detail{display:grid;grid-template-columns:1fr 1fr;gap:clamp(28px,4vw,56px);align-items:center;padding-block:clamp(36px,5vw,64px);border-top:1px solid var(--line)}\n.svc-detail:first-of-type{border-top:none}\n.svc-detail.flip .svc-media{order:2}\n.svc-media .ph{aspect-ratio:4/3;border-radius:var(--r-xl)}\n.svc-detail .tag{font-family:var(--f-mono);font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--blu);font-weight:500}\n.svc-detail.emerg .tag{color:var(--rosso)}\n.svc-detail h2{font-size:clamp(26px,3.4vw,40px);margin:10px 0 14px;letter-spacing:-.025em}\n.svc-detail .meta-rows{display:flex;flex-direction:column;gap:12px;margin:20px 0 24px}\n.svc-detail .mrow{display:flex;gap:13px;align-items:flex-start}\n.svc-detail .mrow .ic{width:38px;height:38px;border-radius:10px;background:var(--bg-2);color:var(--blu);display:grid;place-items:center;flex:none}\n.svc-detail .mrow .ic svg{width:19px;height:19px}\n.svc-detail .mrow b{font-family:var(--f-display);font-weight:700;font-size:14.5px;display:block}\n.svc-detail .mrow span{font-size:14px;color:var(--slate)}\n\n/* ---- Course cards ---- */\n.course-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}\n.ccard{background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden;display:flex;flex-direction:column;transition:box-shadow .2s,tra argin-bottom:16px}\n.field.full{grid-column:1/-1}\n.field label{font-family:var(--f-display);font-weight:600;font-size:14px;color:var(--ink)}\n.field label .req{color:var(--rosso)}\n.field input,.field select,.field textarea{\n  font-family:var(--f-body);font-size:15.5px;color:var(--ink);background:var(--bg);\n  border:1.5px solid var(--line);border-radius:var(--r-sm);padding:13px 15px;width:100%;transition:border-color .15s,background .15s,box-shadow .15s}\n.field textarea{resize:vertical;min-height:130px}\n.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--blu);background:#fff;box-shadow:0 0 0 4px rgba(1,96,161,.12)}\n.field input.err,.field textarea.err,.field select.err{border-color:var(--rosso);background:var(--rosso-tint)}\n.field .hint{font-size:12.5px;color:var(--slate-2)}\n.field .errmsg{font-size:12.5px;color:var(--rosso);font-weight:500;display:none}\n.field.show-err .errmsg{display:block}\n.check{display:flex;gap:11px;align-items:flex-start;font-size:14px;color:var(--slate)}\n.check input{width:19px;height:19px;flex:none;margin-top:2px;accent-color:var(--blu)}\n.form-ok{display:none;text-align:center;padding:30px 10px}\n.form-ok.show{display:block}\n.form-ok .tick{width:64px;height:64px;border-radius:50%;background:var(--verde-tint);color:var(--verde);display:grid;place-items:center;margin:0 auto 18px}\n.form-ok .tick svg{width:32px;height:32px}\n.form-ok h3{font-size:24px;letter-spacing:-.02em;margin-bottom:8px}\n.form-ok p{color:var(--slate);max-width:42ch;margin:0 auto}\n\n/* ---- Callout ---- */\n.callout{display:flex;gap:16px;align-items:flex-start;background:var(--blu-tint);border:1px solid #cfe2f1;border-radius:var(--r-lg);padding:22px 24px}\n.callout.green{background:var(--verde-tint);border-color:#cce6d8}\n.callout.red{background:var(--rosso-tint);border-color:#f3d2d2}\n.callout .ic{width:44px;height:44px;border-radius:12px;background:var(--blu);color:#fff;display:grid;place-items:center;flex:none}\n.callout.green .ic{background:var(--verde)}\n.callout.red .ic{background:var(--rosso)}\n.callout .ic svg{width:22px;height:22px}\n.callout h4{font-size:17px;letter-spacing:-.01em;margin-bottom:5px}\n.callout p{font-size:14.5px;color:var(--slate)}\n.callout p a{color:var(--blu);font-weight:600;text-decoration:underline}\n\n/* ---- CTA band ---- */\n.ctaband{background:var(--blu);color:#fff;border-radius:var(--r-xl);padding:clamp(34px,5vw,60px);display:grid;grid-template-columns:1.4fr auto;gap:30px;align-items:center;position:relative;overflow:hidden}\n.ctaband.green{background:var(--verde)}\n.ctaband::before{content:\"\";position:absolute;inset:0;background:radial-gradient(700px 300px at 100% 0%, rgba(255,255,255,.12), transparent 60%)}\n.ctaband > *{position:relative;z-index:2}\n.ctaband h2{color:#fff;font-size:clamp(26px,3.4vw,40px);letter-spacing:-.025em;max-width:18ch}\n.ctaband p{color:rgba(255,255,255,.86);margin-top:12px;max-width:50ch}\n.ctaband .acts{display:flex;gap:12px;flex-wrap:wrap}\n\n/* ---- Cost / quick info rows ---- */\n.inforows{display:flex;flex-direction:column;gap:0;border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden;background:#fff}\n.inforow{display:flex;gap:16px;align-items:center;padding:18px 22px;border-bottom:1px solid var(--line-2)}\n.inforow:last-child{border-bottom:none}\n.inforow .k{font-family:var(--f-display);font-weight:700;font-size:15px;min-width:200px;flex:none}\n.inforow .v{font-size:14.5px;color:var(--slate)}\n\n@media (max-width:1000px){\n  .split,.split.media-r{grid-template-columns:1fr;gap:40px}\n  .values{grid-template-columns:1fr}\n  .team{grid-template-columns:repeat(2,1fr)}\n  .svc-detail{grid-template-columns:1fr;gap:30px}\n  .svc-detail.flip .svc-media{order:0}\n  .course-cards{grid-template-columns:1fr}\n  .ctaband{grid-template-columns:1fr;gap:24px}\n  .form-grid2{grid-template-columns:1fr}\n  .pbanner-stats{gap:24px}\n}\n@media (max-width:560px){\n  .team{grid-template-columns:1fr 1fr}\n  .inforow{flex-direction:column;align-items:flex-start;gap:4px}\n  .inforow .k{min-width:0}\n}\n\n/* ---- Tabella contributi (trasparenza) ---- */\n.year-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px}\n.year-tab{font-family:var(--f-display);font-weight:700;font-size:14.5px;padding:10px 20px;border-radius:999px;border:1.5px solid var(--line);background:#fff;color:var(--slate);cursor:pointer;transition:.15s}\n.year-tab:hover{border-color:var(--blu);color:var(--blu)}\n.year-tab.active{background:var(--blu);border-color:var(--blu);color:#fff}\n.year-panel{display:none}\n.year-panel.active{display:block}\n.tablecard{border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden;background:#fff;box-shadow:var(--sh-1)}\n.tscroll{overflow-x:auto}\n.ttable{width:100%;border-collapse:collapse;min-width:680px}\n.ttable thead th{font-family:var(--f-mono);font-size:11.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--slate-2);text-align:left;font-weight:500;padding:16px 20px;background:var(--bg);border-bottom:1px solid var(--line)}\n.ttable td{padding:16px 20px;border-bottom:1px solid var(--line-2);font-size:14.5px;color:var(--slate);vertical-align:top}\n.ttable tbody tr:last-child td{border-bottom:none}\n.ttable tbody tr:hover{background:var(--bg)}\n.ttable td.ente{font-family:var(--f-display);font-weight:700;color:var(--ink);font-size:15px}\n.ttable td.amount{font-family:var(--f-mono);font-weight:600;color:var(--ink);white-space:nowrap}\n.ttable tfoot td{padding:16px 20px;background:var(--blu-tint);font-family:var(--f-display);font-weight:800;color:var(--blu);font-size:15px}\n.ttable tfoot td.amount{font-family:var(--f-mono);font-size:16px}\n.tnote{display:flex;gap:10px;align-items:center;padding:14px 20px;background:var(--bg);border-top:1px solid var(--line);font-size:13px;color:var(--slate-2);font-family:var(--f-mono)}\n<\u002Fstyle>\n\n<\u002Fhead>\n<body data-active=\"volontario\">\n\n<div id=\"site-header\"><\u002Fdiv>\n\n<section class=\"pbanner green\">\n  <div class=\"wrap\">\n    <nav class=\"crumbs\"><a href=\"index.html\">Home<\u002Fa><span class=\"sep\">/<\u002Fspan><b>Diventa volontario<\u002Fb><\u002Fnav>\n    <span class=\"eyebrow light\" style=\"color:#9be6bd\">Diventa volontario<\u002Fspan>\n    <h1 style=\"margin-top:16px\">Il tuo tempo può salvare una vita.<\u002Fh1>\n    <p class=\"lead\">Entrare in VAN significa imparare a soccorrere, far parte di una squadra e restituire qualcosa alla tua comunità. <strong style=\"color:#fff\">Non serve esperienza: ti formiamo noi.<\u002Fstrong><\u002Fp>\n    <div style=\"margin-top:28px;display:flex;gap:12px;flex-wrap:wrap\">\n      <a href=\"#candidati\" class=\"btn\" style=\"background:#fff;color:var(--verde-scuro)\">Candidati ora<\u002Fa>\n      <a href=\"#come\" class=\"btn btn-ghost\">Come funziona<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PERCHE -->\n<section class=\"sect\" style=\"background:#fff\">\n  <div class=\"wrap\">\n    <div class=\"shead-c reveal\">\n      <span class=\"eyebrow green\">Perché farlo<\u002Fspan>\n      <h2>Tre buoni motivi per iniziare<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"values\">\n      <div class=\"value g reveal\">\n        <span class=\"ic\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M12 21s-7.5-4.6-9.5-9C1 8.5 3 5 6.5 5c2 0 3.5 1.5 5.5 3.5C14 6.5 15.5 5 17.5 5 21 5 23 8.5 21.5 12c-2 4.4-9.5 9-9.5 9z\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <h3>Aiuti chi ne ha bisogno<\u002Fh3>\n        <p>Ogni servizio è un gesto concreto per qualcuno che, in quel momento, ha bisogno di te.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"value g reveal\">\n        <span class=\"ic\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M3 8l9-4 9 4-9 4-9-4zM7 11v4.5c0 .8 2.2 2 5 2s5-1.2 5-2V11\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <h3>Impari competenze vere<\u002Fh3>\n        <p>Primo soccorso, manovre salvavita e gestione dell'emergenza: conoscenze che restano per sempre.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"value g reveal\">\n        <span class=\"ic\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"9\" cy=\"8\" r=\"3.2\"><\u002Fcircle><path d=\"M3.5 20a5.5 5.5 0 0 1 11 0M17 8v6M14 11h6\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <h3>Entri in una squadra<\u002Fh3>\n        <p>Trovi un gruppo affiatato che condivide valori, turni ed esperienze indimenticabili.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- INFO PRATICHE -->\n<section class=\"sect\" style=\"background:var(--bg)\">\n  <div class=\"wrap split\">\n    <div class=\"reveal\">\n      <span class=\"eyebrow\">In pratica<\u002Fspan>\n      <h2 style=\"font-size:clamp(26px,3.4vw,40px);margin:14px 0 18px\">Le domande che ti stai facendo<\u002Fh2>\n      <p class=\"lead\">Abbiamo raccolto le informazioni essenziali. I dati segnati come <span class=\"tbd\">da confermare<\u002Fspan> verranno definiti con l'associazione.<\u002Fp>\n      <div class=\"callout green\" style=\"margin-top:22px\">\n        <span class=\"ic\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M9 12l2 2 4-4\"><\u002Fpath><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><\u002Fsvg><\u002Fspan>\n        <div><h4>Nessuna esperienza richiesta<\u002Fh4><p>Il percorso formativo è gratuito e seguito passo dopo passo dai nostri istruttori.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"reveal\">\n      <div class=\"inforows\">\n        <div class=\"inforow\"><span class=\"k\">Chi può partecipare<\u002Fspan><span class=\"v\">Maggiorenni con voglia di mettersi in gioco. <span class=\"tbd\">requisiti specifici da confermare<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div class=\"inforow\"><span class=\"k\">Quanto tempo serve<\u002Fspan><span class=\"v\"><span class=\"tbd\">··· ore a settimana<\u002Fspan>, organizzate su turni flessibili<\u002Fspan><\u002Fdiv>\n        <div class=\"inforow\"><span class=\"k\">Serve una patente?<\u002Fspan><span class=\"v\">Non per iniziare. Per la guida dei mezzi <span class=\"tbd\">requisiti da confermare<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div class=\"inforow\"><span class=\"k\">Quanto costa<\u002Fspan><span class=\"v\">Nulla: la formazione di base è gratuita<\u002Fspan><\u002Fdiv>\n        <div class=\"inforow\"><span class=\"k\">Da dove si parte<\u002Fspan><span class=\"v\">Da un colloquio conoscitivo, senza impegno<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- COSA IMPARI -->\n<section class=\"sect\" style=\"background:var(--verde-scuro);color:#fff\" id=\"come\">\n  <div class=\"wrap\">\n    <div class=\"shead-c reveal\">\n      <span class=\"eyebrow light\" style=\"color:#9be6bd\">Come si diventa volontari<\u002Fspan>\n      <h2 style=\"color:#fff\">Quattro passi per iniziare<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"volo-bottom reveal\" style=\"grid-template-columns:1fr;background:rgba(255,255,255,.06)\">\n      <div class=\"steps\">\n        <div class=\"step\"><span class=\"n\">1<\u002Fspan><div><h4>Contattaci<\u002Fh4><p>Compila il modulo qui sotto o chiama la sede: ti raccontiamo come funziona, senza impegno.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div class=\"step\"><span class=\"n\">2<\u002Fspan><div><h4>Vieni a conoscerci<\u002Fh4><p>Ti invitiamo in sede per incontrare i volontari e vedere i mezzi e le attrezzature da vicino.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div class=\"step\"><span class=\"n\">3<\u002Fspan><div><h4>Segui il corso base<\u002Fh4><p>Partecipi al percorso di formazione per soccorritori: gratuito, pratico e seguito passo dopo passo.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div class=\"step\"><span class=\"n\">4<\u002Fspan><div><h4>Entra in squadra<\u002Fh4><p>Affianchi gli equipaggi esperti e inizi a operare al servizio della comunità.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- TESTIMONIANZE -->\n<section class=\"sect\" style=\"background:#fff\">\n  <div class=\"wrap\">\n    <div class=\"shead-c reveal\">\n      <span class=\"eyebrow\">Le voci dei volontari<\u002Fspan>\n      <h2>Chi l'ha fatto, lo racconta<\u002Fh2>\n      <p class=\"lead\">Spazi pronti per le testimonianze reali dei volontari VAN.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"values\">\n      <div class=\"testi reveal\" style=\"box-shadow:var(--sh-1);border:1px solid var(--line)\">\n        <div class=\"quote\">\"<span class=\"tbd\" style=\"border-color:var(--line)\">Testimonianza da inserire<\u002Fspan> — perché ho scelto di entrare in VAN e cosa mi ha dato.\"<\u002Fdiv>\n        <div class=\"who\"><span class=\"ph av\" style=\"border-radius:50%\"><span class=\"cap\" style=\"font-size:8px;padding:3px 5px\">foto<\u002Fspan><\u002Fspan><div><b>Nome volontario<\u002Fb><span>Volontario dal ····<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"testi reveal\" style=\"box-shadow:var(--sh-1);border:1px solid var(--line)\">\n        <div class=\"quote\">\"<span class=\"tbd\" style=\"border-color:var(--line)\">Testimonianza da inserire<\u002Fspan> — la cosa più importante che ho imparato qui.\"<\u002Fdiv>\n        <div class=\"who\"><span class=\"ph av\" style=\"border-radius:50%\"><span class=\"cap\" style=\"font-size:8px;padding:3px 5px\">foto<\u002Fspan><\u002Fspan><div><b>Nome volontario<\u002Fb><span>Volontaria dal ····<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"testi reveal\" style=\"box-shadow:var(--sh-1);border:1px solid var(--line)\">\n        <div class=\"quote\">\"<span class=\"tbd\" style=\"border-color:var(--line)\">Testimonianza da inserire<\u002Fspan> — un episodio che porto con me.\"<\u002Fdiv>\n        <div class=\"who\"><span class=\"ph av\" style=\"border-radius:50%\"><span class=\"cap\" style=\"font-size:8px;padding:3px 5px\">foto<\u002Fspan><\u002Fspan><div><b>Nome volontario<\u002Fb><span>Volontario dal ····<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- CANDIDATI / FORM -->\n<section class=\"sect\" style=\"background:var(--bg)\" id=\"candidati\">\n  <div class=\"wrap split media-r\" style=\"align-items:start\">\n    <div class=\"reveal\">\n      <span class=\"eyebrow green\">Candidati<\u002Fspan>\n      <h2 style=\"font-size:clamp(26px,3.4vw,40px);margin:14px 0 16px\">Fai il primo passo<\u002Fh2>\n      <p class=\"lead\" style=\"margin-bottom:24px\">Lascia i tuoi dati: ti ricontatteremo per un colloquio conoscitivo, senza alcun impegno. Per qualsiasi dubbio puoi anche chiamarci.<\u002Fp>\n      <div class=\"inforows\" style=\"border:none;background:transparent\">\n        <div class=\"cinfo\" style=\"margin-bottom:12px\">\n          <span class=\"ic\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M5 4h4l2 5-3 2a12 12 0 0 0 5 5l2-3 5 2v4a2 2 0 0 1-2 2A16 16 0 0 1 3 6a2 2 0 0 1 2-2z\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          <div class=\"ct\"><small>Telefono<\u002Fsmall><b>030 6898733<\u002Fb><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cinfo\">\n          <span class=\"ic\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><rect x=\"3\" y=\"5\" width=\"18\" height=\"14\" rx=\"2\"><\u002Frect><path d=\"M3 7l9 6 9-6\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          <div class=\"ct\"><small>Email<\u002Fsmall><b>info@ambulanzanuvolento.org<\u002Fb><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"reveal\">\n      <div class=\"formcard\">\n        <div class=\"form-fields\">\n          <form class=\"vform\" novalidate=\"\">\n            <div class=\"form-grid2\">\n              <div class=\"field\"><label>Nome <span class=\"req\">*<\u002Fspan><\u002Flabel><input type=\"text\" name=\"nome\" required=\"\"><span class=\"errmsg\">Inserisci il tuo nome<\u002Fspan><\u002Fdiv>\n              <div class=\"field\"><label>Cognome <span class=\"req\">*<\u002Fspan><\u002Flabel><input type=\"text\" name=\"cognome\" required=\"\"><span class=\"errmsg\">Inserisci il tuo cognome<\u002Fspan><\u002Fdiv>\n              <div class=\"field\"><label>Email <span class=\"req\">*<\u002Fspan><\u002Flabel><input type=\"email\" name=\"email\" required=\"\"><span class=\"errmsg\">Inserisci un'email valida<\u002Fspan><\u002Fdiv>\n              <div class=\"field\"><label>Telefono <span class=\"req\">*<\u002Fspan><\u002Flabel><input type=\"tel\" name=\"tel\" required=\"\"><span class=\"errmsg\">Inserisci un recapito<\u002Fspan><\u002Fdiv>\n              <div class=\"field full\"><label>Fascia d'età<\u002Flabel>\n                <select name=\"eta\"><option value=\"\">Seleziona…<\u002Foption><option>18–25<\u002Foption><option>26–40<\u002Foption><option>41–60<\u002Foption><option>Oltre 60<\u002Foption><\u002Fselect>\n              <\u002Fdiv>\n              <div class=\"field full\"><label>Raccontaci di te <span style=\"color:var(--slate-2);font-weight:400\">(facoltativo)<\u002Fspan><\u002Flabel><textarea name=\"msg\" placeholder=\"Disponibilità, motivazione, eventuali esperienze…\"><\u002Ftextarea><\u002Fdiv>\n            <\u002Fdiv>\n            <label class=\"check\"><input type=\"checkbox\" name=\"privacy\" required=\"\"> <span>Ho letto l'<a href=\"#\" style=\"color:var(--blu)\">informativa privacy<\u002Fa> e acconsento al trattamento dei dati. <span class=\"req\">*<\u002Fspan><\u002Fspan><\u002Flabel>\n            <div class=\"field show-err\" style=\"margin:6px 0 0\"><span class=\"errmsg\" style=\"display:none\">Devi accettare l'informativa<\u002Fspan><\u002Fdiv>\n            <button type=\"submit\" class=\"btn btn-green\" style=\"width:100%;justify-content:center;margin-top:18px\">Invia la candidatura<\u002Fbutton>\n            <p class=\"hint\" style=\"text-align:center;margin-top:12px\">Modulo dimostrativo — non invia ancora dati reali.<\u002Fp>\n          <\u002Fform>\n        <\u002Fdiv>\n        <div class=\"form-ok\">\n          <div class=\"tick\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><path d=\"M5 13l4 4L19 7\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <h3>Grazie!<\u002Fh3>\n          <p>Abbiamo ricevuto la tua candidatura. Ti ricontatteremo presto per il colloquio conoscitivo.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<div id=\"site-footer\"><\u002Fdiv>\n<script src=\"6ecb552b-3cb9-4f1c-9f40-ce0251ced722\"><\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
